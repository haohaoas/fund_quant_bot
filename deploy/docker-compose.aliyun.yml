services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: fund-quant-backend
    restart: unless-stopped
    mem_limit: 1200m
    memswap_limit: 1600m
    pids_limit: 256
    command:
      - uvicorn
      - backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
      - --timeout-keep-alive
      - "5"
      - --limit-concurrency
      - "64"
      - --limit-max-requests
      - "1500"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FUND_DB_PATH: /app/data/fund_assistant.db
      ALLOW_ORIGINS: "*"
      TZ: Asia/Shanghai
    volumes:
      - ../runtime-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
